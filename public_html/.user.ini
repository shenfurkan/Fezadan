upload_max_filesize = 20M
post_max_size = 25M
memory_limit = 256M
max_execution_time = 300
max_input_time = 300

; cPanel/Apache'de /tmp open_basedir tarafindan kisitlanabilir.
; Gecici dosyalar icin kullanicinin kendi home dizinini kullan.
upload_tmp_dir = "/home/fezadano5/tmp"
sys_temp_dir   = "/home/fezadano5/tmp"

session.save_handler = files
session.save_path = "/home/fezadano5/tmp/sessions"
session.use_strict_mode = 1
session.gc_maxlifetime = 1440
